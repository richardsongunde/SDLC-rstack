<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
      .title { font-weight: 700; font-size: 18px; fill: #0F172A; text-anchor: middle; }
      .section-title { font-weight: 700; font-size: 13px; fill: #1E293B; }
      .card-title { font-weight: 600; font-size: 12px; fill: #0F172A; }
      .card-subtitle { font-weight: 500; font-size: 10px; fill: #64748B; }
      .bullet-text { font-weight: 400; font-size: 9.5px; fill: #334155; }
      .flow-label { font-weight: 600; font-size: 9.5px; fill: #475569; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.04" />
    </filter>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4" />
      <stop offset="100%" stop-color="#DCFCE7" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#FAFBFD" />
  <text x="550" y="30" class="title">Layer 5: Continuous Memory, Registry, &amp; Deployment Delivery</text>

  <!-- Box 1: Continuous Memory -->
  <g transform="translate(30, 70)">
    <rect width="220" height="370" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />
    <rect width="220" height="34" rx="12" fill="url(#teal-grad)" />
    <rect y="24" width="220" height="10" fill="url(#teal-grad)" />
    <text x="110" y="22" class="section-title" fill="#065F46" text-anchor="middle">Episodic Memory Store</text>
    
    <g transform="translate(15, 55)">
      <circle cx="12" cy="15" r="8" fill="#F0FDF4" />
      <text x="28" y="18" class="card-title">1. Episodic Store</text>
      <text x="28" y="30" class="card-subtitle">Continuous Learning Feed</text>
      <text x="0" y="48" class="bullet-text">• ~/.rstack/memory/ global store</text>
      <text x="0" y="62" class="bullet-text">• .rstack/memory/ local repository</text>
      <text x="0" y="76" class="bullet-text">• Sanitises credentials at write</text>
      <text x="0" y="90" class="bullet-text">• Stores key learnings &amp; summaries</text>
      <text x="0" y="104" class="bullet-text">• Enables cross-run learning speeds</text>
      <text x="0" y="118" class="bullet-text">• Lexical recalls on task builds</text>
    </g>
  </g>

  <!-- Box 2: Asset Registry -->
  <g transform="translate(295, 70)">
    <rect width="220" height="370" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />
    <rect width="220" height="34" rx="12" fill="url(#teal-grad)" />
    <rect y="24" width="220" height="10" fill="url(#teal-grad)" />
    <text x="110" y="22" class="section-title" fill="#065F46" text-anchor="middle">Asset Registry Index</text>

    <g transform="translate(15, 55)">
      <circle cx="12" cy="15" r="8" fill="#F0FDF4" />
      <text x="28" y="18" class="card-title">2. Assets &amp; Routing</text>
      <text x="28" y="30" class="card-subtitle">196 Agents · 156 Skills</text>
      <text x="0" y="48" class="bullet-text">• Combined index maps in registry/</text>
      <text x="0" y="62" class="bullet-text">• 196 core &amp; specialist agents</text>
      <text x="0" y="76" class="bullet-text">• 156 skills (deploy, review, OWASP)</text>
      <text x="0" y="90" class="bullet-text">• 72 domain-specific plugin packs</text>
      <text x="0" y="104" class="bullet-text">• 36 prompts commands registry</text>
      <text x="0" y="118" class="bullet-text">• Dynamic routing stage ➔ agent</text>
    </g>
  </g>

  <!-- Box 3: Target Deployment -->
  <g transform="translate(560, 70)">
    <rect width="220" height="370" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />
    <rect width="220" height="34" rx="12" fill="url(#teal-grad)" />
    <rect y="24" width="220" height="10" fill="url(#teal-grad)" />
    <text x="110" y="22" class="section-title" fill="#065F46" text-anchor="middle">CI/CD Deploy Engine</text>

    <g transform="translate(15, 55)">
      <circle cx="12" cy="15" r="8" fill="#F0FDF4" />
      <text x="28" y="18" class="card-title">3. Production Release</text>
      <text x="28" y="30" class="card-subtitle">Zero-Downtime Delivery</text>
      <text x="0" y="48" class="bullet-text">• Executes deploy steps on stage 09</text>
      <text x="0" y="62" class="bullet-text">• Manages zero-downtime rollouts</text>
      <text x="0" y="76" class="bullet-text">• Integrates with GitHub CI pipelines</text>
      <text x="0" y="90" class="bullet-text">• Validates post-deploy status check</text>
      <text x="0" y="104" class="bullet-text">• Automated rolls back on exceptions</text>
      <text x="0" y="118" class="bullet-text">• Locks deployment logs in run dir</text>
    </g>
  </g>

  <!-- Box 4: Multi-Channel Notifications -->
  <g transform="translate(825, 70)">
    <rect width="240" height="370" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2" filter="url(#shadow)" />
    <rect width="240" height="34" rx="12" fill="#DBEAFE" />
    <rect y="24" width="240" height="10" fill="#DBEAFE" />
    <text x="120" y="22" class="section-title" fill="#1E40AF" text-anchor="middle">Notifications &amp; Alerts</text>

    <g transform="translate(15, 55)">
      <circle cx="12" cy="15" r="8" fill="#DBEAFE" />
      <text x="28" y="18" class="card-title" fill="#1E40AF">4. Alerts Dispatcher</text>
      <text x="28" y="30" class="card-subtitle" fill="#1E40AF">Slack, Discord, &amp; Email Alerts</text>
      <text x="0" y="48" class="bullet-text" fill="#1E3A8A" style="font-weight:600;">Instant Broadcast Alerts:</text>
      <text x="0" y="62" class="bullet-text" fill="#1E3A8A">• Pushes approval request card to Slack</text>
      <text x="0" y="76" class="bullet-text" fill="#1E3A8A">• Direct alerts email on budget events</text>
      <text x="0" y="90" class="bullet-text" fill="#1E3A8A">• Deliveries status logs update to Discord</text>
      <text x="0" y="104" class="bullet-text" fill="#1E3A8A">• Code review quality warnings dispatch</text>
      <text x="0" y="118" class="bullet-text" fill="#1E3A8A">• Final successful deploy card push</text>
    </g>
  </g>

  <!-- Connectors -->
  <path d="M 250 250 H 295" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <path d="M 515 250 H 560" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <path d="M 780 250 H 825" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)" />

</svg>
