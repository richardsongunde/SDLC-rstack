name: Validate Package Assets

on:
  push:
    paths:
      - "agents/**"
      - "skills/**"
      - "plugins/**"
      - "prompts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "agents/**"
      - "skills/**"
      - "plugins/**"
      - "prompts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"

jobs:
  validate:
    name: Validate RStack package assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate agent definitions
        run: npm run validate

      - name: Run reference tests
        run: npm test
