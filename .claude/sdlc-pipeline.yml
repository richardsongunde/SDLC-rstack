# SDLC Automation Pipeline Configuration
# This file defines the entire pipeline: agents, order, parameters, and preferences.
# Use this for reproducible, version-controlled pipeline runs.
#
# Usage: "Run the pipeline using sdlc-pipeline.yml configuration"

pipeline:
  name: "SDLC Automation Pipeline"
  version: "2.0"
  description: "End-to-end SDLC automation from meeting transcript to deployment"

# Input configuration
input:
  transcripts:
    - path: "inputs/transcript.txt"
    # For multi-transcript merger, add more:
    # - path: "inputs/followup_meeting.txt"
    #   priority: 2  # Higher = takes precedence on conflicts
  source: "local"  # Options: local, zoom, teams, google_meet, otter_ai, audio_file

# Execution mode
execution:
  mode: "interactive"  # Options: interactive, express, replay
  parallel_groups:  # DAG-based parallel execution
    phase_1_analysis:
      agents: [transcript_agent, environment_agent]
      parallel: true
    phase_2_requirements:
      agents: [requirement_agent]
      depends_on: [phase_1_analysis]
    phase_3_documentation:
      agents: [documentation_agent, planning_agent]
      parallel: true
      depends_on: [phase_2_requirements]
    phase_4_design:
      agents: [jira_agent, architecture_agent]
      parallel: true
      depends_on: [phase_3_documentation]
    phase_5_security:  # Optional
      agents: [security_threat_model_agent]
      depends_on: [phase_4_design]
      optional: true
      enabled: false  # Set to true to enable
    phase_6_implementation:
      agents: [code_agent]
      depends_on: [phase_4_design, phase_5_security]
    phase_7_quality:
      agents: [testing_agent, compliance_checker_agent]
      parallel: true
      depends_on: [phase_6_implementation]
      optional_agents: [compliance_checker_agent]
    phase_8_deployment:
      agents: [deployment_agent]
      depends_on: [phase_7_quality]
    phase_9_delivery:
      agents: [summary_agent, cost_estimation_agent, feedback_loop_agent]
      parallel: false  # Summary first, then cost, then feedback
      depends_on: [phase_8_deployment]
      optional_agents: [cost_estimation_agent]

# Pre-loaded user preferences (for replay mode)
user_preferences:
  ticketing_platform: "file_based"  # jira_cloud, github_issues, azure_devops, linear, file_based
  ticketing_credentials:
    # jira_base_url: ""
    # jira_api_token: ""
    # jira_project_key: ""
  database_engine: "sqlite"  # postgresql, mysql, sqlite, mongodb
  deployment_platform: "docker_compose"  # docker_compose, kubernetes, manual_scripts
  ci_cd_platform: "github_actions"  # github_actions, gitlab_ci, jenkins, azure_pipelines, none
  cloud_provider: "none"  # aws, azure, gcp, none
  documentation_platform: "local"  # local, confluence, notion, sharepoint
  install_tools_when_missing: true
  interactive_mode: true

# Optional agents toggle
optional_agents:
  security_threat_model: false
  compliance_checker: true  # Auto-enable for regulated domains
  cost_estimation: false
  feedback_loop: true

# Notification configuration
notifications:
  enabled: false
  channels:
    # slack:
    #   webhook_url: ""
    #   channel: "#sdlc-pipeline"
    # teams:
    #   webhook_url: ""
    # email:
    #   smtp_server: ""
    #   recipients: []
  events:
    - agent_completed
    - pipeline_completed
    - error_occurred

# Analytics
analytics:
  enabled: true
  track_token_usage: true
  track_execution_time: true
  output_file: "outputs/analytics/pipeline_metrics.json"

# Quality gates
quality_gates:
  code_quality_minimum_score: 70
  test_coverage_minimum: 60
  vulnerability_max_critical: 0
  vulnerability_max_high: 3
